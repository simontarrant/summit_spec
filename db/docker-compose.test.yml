services:
  postgres-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: summit_spec_test_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-simontarrant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: gear_garage_test
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-simontarrant} -d gear_garage_test"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_test_data:
    name: summit_spec_test_postgres_data
