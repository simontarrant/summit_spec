services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: summit_spec_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-simontarrant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-summit_spec}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-simontarrant} -d ${POSTGRES_DB:-summit_spec}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: summit_spec_postgres_data
